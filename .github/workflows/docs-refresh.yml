name: Docs Refresh (reusable)

# Auto-refreshes README.md and CLAUDE.md against the current code.
#
# Modes:
#   refresh   — update existing docs where they have drifted (Sonnet)
#   bootstrap — generate docs from scratch for repos that have none (Opus)
#
# Behavior: pushes the doc updates directly to the trigger branch
# (the PR's base ref, or the dispatched ref). No PRs, no reviewer,
# no scope/size gates. The bot needs push permission on dev/main —
# either no branch protection, or a bypass via GITHUB_TOKEN.
#
# Caller stub (drop into any vioxen repo as `.github/workflows/docs-refresh.yml`):
#
#   name: Docs Refresh
#   on:
#     pull_request:
#       types: [closed]
#       branches: [dev, main]
#       paths-ignore:
#         - "README.md"
#         - "CLAUDE.md"
#         - ".claude/CLAUDE.md"
#         - "docs/**"
#         - ".claude/rules/**"
#         - ".github/**"
#     workflow_dispatch:
#       inputs:
#         mode:
#           description: "refresh | bootstrap"
#           type: choice
#           options: [refresh, bootstrap]
#           default: refresh
#   jobs:
#     refresh:
#       if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
#       uses: vioxen/org-workflows/.github/workflows/docs-refresh.yml@main
#       with:
#         mode: ${{ inputs.mode || 'refresh' }}
#       secrets: inherit
#
# Required secret in the caller repo (or org-level):
#   ANTHROPIC_API_KEY_CI — Anthropic API key for Claude

on:
  workflow_call:
    inputs:
      mode:
        description: "refresh | bootstrap"
        type: string
        required: false
        default: refresh
      runs-on:
        description: "Runner label (defaults to arc-runner-set)"
        type: string
        required: false
        default: "arc-runner-set"
      org_workflows_ref:
        description: "Ref of vioxen/org-workflows to use for shared scripts/prompts"
        type: string
        required: false
        default: "main"
    secrets:
      ANTHROPIC_API_KEY_CI:
        description: "Anthropic API key for Claude"
        required: true
      QUANTA_PIPELINE_TOKEN:
        description: "Org PAT (admin) for pushes to branches with required-status-check protection. Optional — falls back to GITHUB_TOKEN where dev/main is unprotected."
        required: false

permissions:
  contents: write
  id-token: write

# Coalesce rapid merges: if a new push lands while a refresh is running,
# cancel the in-flight one and start fresh on the latest HEAD. We never
# care about intermediate states.
concurrency:
  group: docs-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ${{ inputs.runs-on }}
    env:
      MODE: ${{ inputs.mode }}
      # Trigger branch: PR base ref for pull_request events, dispatched ref otherwise.
      TARGET_BRANCH: ${{ github.event.pull_request.base.ref || github.ref_name }}
    steps:
      # Checks out the calling repo into $GITHUB_WORKSPACE (default).
      # claude-code-action@v1 operates on $GITHUB_WORKSPACE, so the caller
      # MUST stay at the workspace root — no `path:` indirection.
      # We check out the target branch tip explicitly so commits land on
      # the actual branch and not a detached merge ref.
      - name: Checkout calling repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          # Prefer QUANTA_PIPELINE_TOKEN (admin, bypasses non_admins-enforced
          # branch protection on dev/main). Falls back to GITHUB_TOKEN where
          # the secret isn't available — the push step will then succeed only
          # on unprotected branches.
          token: ${{ secrets.QUANTA_PIPELINE_TOKEN || secrets.GITHUB_TOKEN }}

      # Fetch shared scripts + prompts to $RUNNER_TEMP (OUTSIDE $GITHUB_WORKSPACE)
      # so they don't show up in `git diff` or `git add -A` against the caller repo.
      - name: Fetch org-workflows shared assets
        env:
          ORG_WF_REF: ${{ inputs.org_workflows_ref }}
        run: |
          git clone --depth=1 --branch="$ORG_WF_REF" \
            https://github.com/vioxen/org-workflows.git "$RUNNER_TEMP/org-workflows"
          echo "ORG_WF_DIR=$RUNNER_TEMP/org-workflows" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pre-scan repo surface (deterministic, no LLM)
        run: |
          python3 "$ORG_WF_DIR/scripts/context-scanner.py" > /tmp/repo-context.json
          echo "Scan summary:"
          python3 -c "
          import json
          d = json.load(open('/tmp/repo-context.json'))
          print(f'  package_files: {len(d.get(\"package_files\", []))}')
          print(f'  http_routes:   {len(d.get(\"http_routes\", []))}')
          print(f'  env_vars:      {len(d.get(\"env_vars_referenced\", []))}')
          print(f'  ports:         {len(d.get(\"ports_referenced\", []))}')
          print(f'  vue_pages:     {len(d.get(\"vue_pages\", []))}')
          print(f'  react_routes:  {len(d.get(\"react_routes\", []))}')
          print(f'  proto_files:   {len(d.get(\"proto_files\", []))}')
          print(f'  docker_svc:    {len(d.get(\"docker_services\", []))}')
          "

      - name: Compute drift report (deterministic, no LLM)
        if: env.MODE == 'refresh'
        run: |
          REPO_CONTEXT_PATH=/tmp/repo-context.json \
          DRIFT_REPORT_PATH=/tmp/drift-report.json \
          python3 "$ORG_WF_DIR/scripts/drift-detector.py"
          if [ -f /tmp/drift-report.json ]; then
            python3 -c "
          import json
          d = json.load(open('/tmp/drift-report.json'))
          stats = d.get('stats', {})
          print(f'Drift items: {stats.get(\"total\", 0)} total ({stats.get(\"high\", 0)} high, {stats.get(\"medium\", 0)} medium)')
          for it in d.get('drift_items', [])[:20]:
              print(f'  [{it[\"severity\"]:6}] {it[\"kind\"]:20} {it[\"value\"]}')
          "
          fi

      - name: Configure git identity
        run: |
          git config user.name  "vioxen-docs-bot"
          git config user.email "docs-bot@users.noreply.github.com"

      # `claude-code-action@v1` only accepts an inline `prompt` input — no
      # `prompt_file` support. Read the file into a step output first.
      - name: Load refresher prompt
        id: load_prompt
        run: |
          delim="EOF_$(date +%s%N)"
          {
            printf 'prompt<<%s\n' "$delim"
            cat "$ORG_WF_DIR/prompts/docs-${MODE}.md"
            printf '\n%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude (${{ inputs.mode }})
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY_CI }}
          # Pass the workflow's GITHUB_TOKEN to bypass the "Claude Code GitHub
          # App not installed" check. permissions: contents:write above is
          # what the bot actually needs (PRs are no longer created).
          # Side benefit: commits are attributed to github-actions[bot], not
          # @claude[bot] — aligns with the no-AI-authorship rule (rule 05).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.load_prompt.outputs.prompt }}
          claude_args: |
            --model ${{ inputs.mode == 'bootstrap' && 'claude-opus-4-7' || 'claude-sonnet-4-6' }}
            --allowedTools Read,Edit,Write,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git status:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(find:*)
            --max-turns 60

      - name: Commit & push directly to ${{ env.TARGET_BRANCH }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No drift detected; nothing to commit."
            exit 0
          fi

          # Snapshot Claude's changes BEFORE any commit/push. This lets us
          # recover from any push failure (race, force-push, shallow rebase
          # add/add conflicts) by hard-resetting to the latest origin/<branch>
          # and re-applying the snapshot — which never conflicts with itself.
          SNAP=/tmp/docs-snapshot
          rm -rf "$SNAP" && mkdir -p "$SNAP/files"
          git diff --name-only > "$SNAP/files.list"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            mkdir -p "$SNAP/files/$(dirname "$f")"
            cp "$f" "$SNAP/files/$f"
          done < "$SNAP/files.list"
          echo "Snapshot $(wc -l < "$SNAP/files.list") changed file(s)."

          for attempt in 1 2 3; do
            # On retries, sync to latest origin and re-apply snapshot.
            if [ "$attempt" -gt 1 ]; then
              echo "Re-applying snapshot onto fresh origin/${TARGET_BRANCH}…"
              git fetch origin "$TARGET_BRANCH"
              git reset --hard "origin/${TARGET_BRANCH}"
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                mkdir -p "$(dirname "$f")"
                cp "$SNAP/files/$f" "$f"
              done < "$SNAP/files.list"
              if git diff --quiet; then
                echo "Snapshot already in origin/${TARGET_BRANCH}; nothing to push."
                exit 0
              fi
            fi

            git add -u
            git commit -m "docs: ${MODE} README + CLAUDE.md against current code" || {
              # Possible no-op commit if snapshot matched origin exactly.
              echo "Nothing to commit on attempt $attempt."
              exit 0
            }

            if git push origin "HEAD:${TARGET_BRANCH}"; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt)."
          done
          echo "::error::Push to ${TARGET_BRANCH} failed after 3 attempts."
          exit 1
